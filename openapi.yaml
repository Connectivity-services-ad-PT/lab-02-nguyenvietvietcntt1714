openapi: 3.1.0
info:
  title: AI Vision Analysis Service API
  version: 1.0.0-oas3.1
  description: Hệ thống API cung cấp dịch vụ phân tích hình ảnh bằng AI (nhận diện khuôn mặt, phát hiện đối tượng).
  contact:
    name: FIT4110 Nhóm 11
    email: 1771020750@dainam.edu.vn
servers:
  - url: http://localhost:4010
    description: Prism mock server
  - url: https://api.campus.local
    description: Class network placeholder
tags:
  - name: health
    description: Kiểm tra trạng thái service
  - name: analyses
    description: Quản lý các yêu cầu phân tích hình ảnh
  - name: vision-events
    description: Tiếp nhận kết quả phân tích từ AI Engine (Polymorphism)
security:
  - bearerAuth: []
paths:
  /health:
    get:
      operationId: getHealth
      summary: Kiểm tra trạng thái service
      description: Endpoint kiểm tra service còn hoạt động.
      tags:
        - health
      security: []
      responses:
        '200':
          description: Service đang hoạt động
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
              examples:
                ok:
                  value:
                    status: ok
                    service: ai-vision-service
                    time: '2026-05-20T08:00:00Z'
  /analyses:
    post:
      operationId: createAnalysis
      summary: Gửi yêu cầu phân tích ảnh
      description: Tạo một job mới để AI Engine tiến hành phân tích hình ảnh được cung cấp.
      tags:
        - analyses
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAnalysisRequest'
            examples:
              newAnalysis:
                value:
                  sourceSystem: mobile-app
                  analysisType: FACE_RECOGNITION
                  imageUrl: https://example.com/images/sample.jpg
                  priority: HIGH
      responses:
        '201':
          description: Yêu cầu phân tích đã được tạo
          headers:
            Location:
              description: URI của job phân tích vừa tạo.
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Analysis'
              examples:
                created:
                  value:
                    id: 0196fb3d-4ad7-7d1e-9f49-5d5148d2babc
                    sourceSystem: mobile-app
                    analysisType: FACE_RECOGNITION
                    imageUrl: https://example.com/images/sample.jpg
                    priority: HIGH
                    status: PENDING
                    createdAt: '2026-05-20T08:00:00Z'
                    completedAt: null
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      operationId: listAnalyses
      summary: Lấy danh sách các yêu cầu phân tích
      description: Lấy danh sách lịch sử phân tích với cursor-based pagination.
      tags:
        - analyses
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Danh sách yêu cầu
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisPage'
              examples:
                firstPage:
                  value:
                    items:
                      - id: 0196fb3d-4ad7-7d1e-9f49-5d5148d2babc
                        sourceSystem: mobile-app
                        analysisType: FACE_RECOGNITION
                        imageUrl: https://example.com/images/sample.jpg
                        priority: HIGH
                        status: PROCESSING
                        createdAt: '2026-05-20T08:00:00Z'
                        completedAt: null
                    nextCursor: null
                    hasMore: false
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /analyses/recent:
    get:
      operationId: getRecentAnalyses
      summary: Lấy các phân tích gần đây
      description: Danh sách các phân tích vừa được gửi lên hệ thống.
      tags:
        - analyses
      parameters:
        - name: limit
          in: query
          required: false
          description: Số item tối đa cần lấy.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Danh sách phân tích gần đây
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - items
                properties:
                  items:
                    type: array
                    minItems: 0
                    maxItems: 100
                    items:
                      $ref: '#/components/schemas/Analysis'
              examples:
                recentAnalyses:
                  value:
                    items: []
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /analyses/{analysisId}:
    get:
      operationId: getAnalysisById
      summary: Lấy chi tiết một phiên phân tích
      description: Lấy chi tiết trạng thái và kết quả phân tích theo UUID.
      tags:
        - analyses
      parameters:
        - $ref: '#/components/parameters/AnalysisId'
      responses:
        '200':
          description: Chi tiết phân tích
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Analysis'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /vision-events:
    post:
      operationId: receiveVisionEvent
      summary: Nhận kết quả từ AI Engine
      description: Endpoint minh họa polymorphism cho ObjectDetectedEvent hoặc FaceDetectedEvent.
      tags:
        - vision-events
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VisionEvent'
            examples:
              objectEvent:
                value:
                  eventType: OBJECT_DETECTED
                  eventId: 0196fb3d-4ad7-7d1e-9f49-5d5148d2babc
                  analysisId: 0196fb3d-4ad7-7d1e-9f49-5d5148d2babc
                  label: Car
                  confidence: 0.98
                  timestamp: '2026-05-20T08:01:00Z'
              faceEvent:
                value:
                  eventType: FACE_DETECTED
                  eventId: 0196fb3d-4ad7-7d1e-9f49-5d5148d2babd
                  analysisId: 0196fb3d-4ad7-7d1e-9f49-5d5148d2babc
                  emotion: Happy
                  confidence: 0.95
                  timestamp: '2026-05-20T08:01:00Z'
      responses:
        '201':
          description: Event đã được ghi nhận
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventAccepted'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
webhooks:
  analysisCompleted:
    post:
      operationId: onAnalysisCompleted
      summary: Webhook khi phân tích hoàn tất
      description: Bắn sự kiện về Client khi quá trình phân tích AI hoàn thành.
      tags:
        - analyses
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Analysis'
      responses:
        '200':
          description: Consumer đã nhận webhook
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    AnalysisId:
      name: analysisId
      in: path
      required: true
      description: UUID của phiên phân tích.
      schema:
        type: string
        format: uuid
    Cursor:
      name: cursor
      in: query
      required: false
      description: Cursor dùng để lấy trang tiếp theo.
      schema:
        type:
          - string
          - 'null'
        minLength: 1
        maxLength: 200
    Limit:
      name: limit
      in: query
      required: false
      description: Số item tối đa mỗi trang.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
  schemas:
    HealthStatus:
      type: object
      additionalProperties: false
      required:
        - status
        - service
        - time
      properties:
        status:
          type: string
          enum:
            - ok
          description: Trạng thái service.
          example: ok
        service:
          type: string
          minLength: 2
          maxLength: 80
          description: Tên service.
          example: ai-vision-service
        time:
          type: string
          format: date-time
          description: Thời điểm kiểm tra.
          example: '2026-05-20T08:00:00Z'
    CreateAnalysisRequest:
      type: object
      additionalProperties: false
      required:
        - sourceSystem
        - analysisType
        - imageUrl
      properties:
        sourceSystem:
          type: string
          minLength: 2
          maxLength: 80
          pattern: ^[a-z0-9-]+$
          description: Hệ thống gọi API.
          example: mobile-app
        analysisType:
          type: string
          enum:
            - OBJECT_DETECTION
            - FACE_RECOGNITION
            - OCR_TEXT_EXTRACTION
          description: Loại hình phân tích.
          example: FACE_RECOGNITION
        priority:
          $ref: '#/components/schemas/AnalysisPriority'
        imageUrl:
          type: string
          format: uri
          minLength: 5
          maxLength: 1000
          description: URL hình ảnh.
          example: https://example.com/images/sample.jpg
    Analysis:
      type: object
      additionalProperties: false
      required:
        - id
        - sourceSystem
        - analysisType
        - imageUrl
        - status
        - createdAt
      properties:
        id:
          type: string
          format: uuid
          description: UUID của phiên phân tích.
          example: 0196fb3d-4ad7-7d1e-9f49-5d5148d2babc
        sourceSystem:
          type: string
          minLength: 2
          maxLength: 80
          pattern: ^[a-z0-9-]+$
          description: Hệ thống gọi API.
          example: mobile-app
        analysisType:
          type: string
          enum:
            - OBJECT_DETECTION
            - FACE_RECOGNITION
            - OCR_TEXT_EXTRACTION
          description: Loại hình phân tích.
          example: FACE_RECOGNITION
        priority:
          $ref: '#/components/schemas/AnalysisPriority'
        imageUrl:
          type: string
          format: uri
          minLength: 5
          maxLength: 1000
          description: URL hình ảnh.
          example: https://example.com/images/sample.jpg
        status:
          type: string
          enum:
            - PENDING
            - PROCESSING
            - COMPLETED
            - FAILED
          description: Trạng thái xử lý.
          example: PROCESSING
        createdAt:
          type: string
          format: date-time
          description: Thời điểm tạo.
          example: '2026-05-20T08:00:00Z'
        completedAt:
          type:
            - string
            - 'null'
          format: date-time
          description: Thời điểm phân tích xong.
          example: null
    AnalysisPriority:
      type: string
      enum:
        - LOW
        - NORMAL
        - HIGH
      description: Mức độ ưu tiên.
      example: NORMAL
    AnalysisPage:
      type: object
      additionalProperties: false
      required:
        - items
        - nextCursor
        - hasMore
      properties:
        items:
          type: array
          minItems: 0
          maxItems: 100
          items:
            $ref: '#/components/schemas/Analysis'
        nextCursor:
          type:
            - string
            - 'null'
          description: Cursor trang tiếp theo.
          example: null
        hasMore:
          type: boolean
          description: Còn dữ liệu hay không.
          example: false
    VisionEvent:
      oneOf:
        - $ref: '#/components/schemas/ObjectDetectedEvent'
        - $ref: '#/components/schemas/FaceDetectedEvent'
      discriminator:
        propertyName: eventType
        mapping:
          OBJECT_DETECTED: '#/components/schemas/ObjectDetectedEvent'
          FACE_DETECTED: '#/components/schemas/FaceDetectedEvent'
    ObjectDetectedEvent:
      type: object
      additionalProperties: false
      required:
        - eventType
        - eventId
        - analysisId
        - label
        - confidence
        - timestamp
      properties:
        eventType:
          type: string
          const: OBJECT_DETECTED
          description: Loại event.
          example: OBJECT_DETECTED
        eventId:
          type: string
          format: uuid
          description: UUID của event.
        analysisId:
          type: string
          format: uuid
          description: ID của phiên phân tích.
        label:
          type: string
          minLength: 1
          maxLength: 100
          description: Tên vật thể.
          example: Car
        confidence:
          type: number
          minimum: 0
          maximum: 1
          description: Độ tin cậy.
          example: 0.98
        timestamp:
          type: string
          format: date-time
          description: Thời điểm phát hiện.
    FaceDetectedEvent:
      type: object
      additionalProperties: false
      required:
        - eventType
        - eventId
        - analysisId
        - emotion
        - confidence
        - timestamp
      properties:
        eventType:
          type: string
          const: FACE_DETECTED
          description: Loại event.
          example: FACE_DETECTED
        eventId:
          type: string
          format: uuid
          description: UUID của event.
        analysisId:
          type: string
          format: uuid
          description: ID của phiên phân tích.
        emotion:
          type: string
          minLength: 1
          maxLength: 50
          description: Cảm xúc.
          example: Happy
        confidence:
          type: number
          minimum: 0
          maximum: 1
          description: Độ tin cậy.
          example: 0.95
        timestamp:
          type: string
          format: date-time
          description: Thời điểm nhận diện.
    EventAccepted:
      type: object
      additionalProperties: false
      required:
        - eventId
        - acceptedAt
      properties:
        eventId:
          type: string
          format: uuid
          description: UUID của event được nhận.
        acceptedAt:
          type: string
          format: date-time
          description: Thời điểm hệ thống ghi nhận event.
    Problem:
      type: object
      additionalProperties: false
      required:
        - type
        - title
        - status
      properties:
        type:
          type: string
          format: uri
          description: URI định danh loại lỗi.
          example: https://api.campus.local/errors/validation
        title:
          type: string
          minLength: 3
          maxLength: 120
          description: Tiêu đề lỗi ngắn gọn.
          example: Dữ liệu không hợp lệ
        status:
          type: integer
          minimum: 400
          maximum: 599
          description: HTTP status code.
          example: 400
        detail:
          type:
            - string
            - 'null'
          maxLength: 500
          description: Mô tả chi tiết lỗi.
          example: Field imageUrl không đúng định dạng URI
        instance:
          type:
            - string
            - 'null'
          format: uri
          description: URI của request gây lỗi.
          example: https://api.campus.local/analyses
        errors:
          type: array
          minItems: 0
          maxItems: 50
          items:
            type: object
            additionalProperties: false
            required:
              - field
              - code
              - message
            properties:
              field:
                type: string
                minLength: 1
                maxLength: 80
                example: imageUrl
              code:
                type: string
                minLength: 2
                maxLength: 80
                example: INVALID_FORMAT
              message:
                type: string
                minLength: 3
                maxLength: 200
                example: imageUrl phải là một đường dẫn hợp lệ
  responses:
    BadRequest:
      description: Dữ liệu sai định dạng
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: https://api.campus.local/errors/validation
            title: Dữ liệu không hợp lệ
            status: 400
            detail: Payload không đúng JSON Schema
            instance: https://api.campus.local/analyses
            errors:
              - field: analysisType
                code: ENUM_MISMATCH
                message: analysisType không nằm trong danh sách cho phép
    Unauthorized:
      description: Thiếu hoặc sai thông tin xác thực
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: https://api.campus.local/errors/unauthorized
            title: Chưa xác thực
            status: 401
            detail: Thiếu Bearer token
            instance: https://api.campus.local/analyses/recent
            errors: []
    Forbidden:
      description: Không có quyền thực hiện thao tác
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    NotFound:
      description: Resource không tồn tại
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Conflict:
      description: Xung đột nghiệp vụ hoặc trùng idempotency key
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    UnprocessableEntity:
      description: Payload đúng định dạng nhưng không hợp lệ về nghiệp vụ
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    InternalServerError:
      description: Lỗi không mong muốn phía server
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
